name: Build and Push to Docker Hub

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Senior Practice: Tag with both 'latest' and the short Git commit SHA
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{env.DOCKERHUB_REGISTRY_NAME}}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{env.DOCKERHUB_REGISTRY_NAME}}:${{ github.sha }}
          # Enable caching to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max